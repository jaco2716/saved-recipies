<!DOCTYPE html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#c1440e" />
    <!-- Skift titlen til navnet på din opskrift -->
    <title>Opskriftens navn</title>
    <link rel="stylesheet" href="../style.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍳</text></svg>"
    />
  </head>
  <body>
    <main class="wrap">
      <a class="back" href="../index.html">← Alle opskrifter</a>

      <article class="recipe">
        <!-- Titel på opskriften -->
        <h1>Opskriftens navn</h1>

        <!-- Kort info. Ret tallene, eller slet linjer du ikke bruger -->
        <div class="meta">
          <span><strong>Antal:</strong> 4 personer</span>
          <span><strong>Tid:</strong> 30 min</span>
        </div>

        <h2 class="section">Ingredienser</h2>
        <ul class="ingredients">
          <li>Ingrediens 1</li>
          <li>Ingrediens 2</li>
          <li>Ingrediens 3</li>
        </ul>

        <h2 class="section">Fremgangsmåde</h2>
        <ol class="steps">
          <li>Første trin.</li>
          <li>Andet trin.</li>
          <li>Tredje trin.</li>
        </ol>

        <!-- Valgfri noter. Slet hele blokken hvis du ikke bruger den -->
        <div class="notes">
          💡 <strong>Tip:</strong> Skriv eventuelle noter, variationer eller
          tips her.
        </div>
      </article>
    </main>

    <footer class="site">Gemt og bygget med ❤️ i HTML</footer>
  </body>
</html>
